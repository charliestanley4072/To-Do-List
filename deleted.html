<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List - Recently Deleted</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
	<main>
		<div class="title">
			<img src="images/bin.png" class="icon-left">
			<span class="title-text">Recently Deleted</span>
			<img src="images/bin.png" class="icon-right">
		</div>

		<div class="rounded-box">
            <button class="clear-btn" onclick="if(confirm('Permanently delete all?')){localStorage.removeItem('deletedTasks');location.reload();}">
                Delete All
            </button>

			<div class="nav-container">
				<nav class="nav1">
					<a href="index.html">To-Do List</a>
					<a href="completed.html">Completed</a>
				</nav>
			</div>

			<div id="todo-app">
				<ul id="task-list" class="completed-view"></ul>
			</div>
		</div>
	</main>

	<script>
        const listElement = document.getElementById("task-list");
        const MS_PER_72_HOURS = 259200000; // Auto-delete after 3 days
        
        // 1. Get and Filter
        let tasks = JSON.parse(localStorage.getItem("deletedTasks") || "[]");
        tasks = tasks.filter(t => (Date.now() - t.time) < MS_PER_72_HOURS);
        // Removes any reminders that are empty or just spaces
        tasks = tasks.filter(t => t.text && t.text.trim() !== "");

        // 2. Sync LocalStorage
        localStorage.setItem("deletedTasks", JSON.stringify(tasks));

        // 3. Render
		if (tasks.length === 0) {
			listElement.innerHTML = "<li style='opacity:0.5; list-style:none; font-size:1.5rem;'>No tasks here.</li>";
		} else {
			listElement.innerHTML = tasks.map(t => `
				<li style="display: flex; align-items: center; margin-bottom: 12px; list-style: none; width: 100%; font-size: 1.5rem; color: #5a4a1f;">
					<span style="flex-shrink: 0; width: 35px; display: flex; align-items: center; justify-content: center;">▪</span>
					<span style="flex: 1; word-break: break-word; line-height: 1.2; min-width: 0; display: inline-block;">${t.text}</span>
				</li>`).join('');
		}
    </script>
</body>
</html>
