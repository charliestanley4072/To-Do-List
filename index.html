<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="icon" type="image/x-icon" href="images/favicon.png">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>To-Do List - Main</title>
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<img src="images/screw.png" class="screw top-left">
    <img src="images/screw.png" class="screw top-right">
    <img src="images/screw.png" class="screw bottom-left">
    <img src="images/screw.png" class="screw bottom-right">
	
<main>
    <div class="title">
		<div id="calendar-trigger" style="display: inline-block;">
			<img class="calendar-icon" src="images/calendar.png" alt="Calendar">
			
			<div id="calendar-panel" class="side-panel-left">
				<div class="panel-content">
					<h2><u>Calendar</u></h2>
					<div class="setting-item">
						<button id="schedule-dropdown-btn" class="dropdown-toggle-btn">Schedule</button>
						<div id="days-dropdown" class="dropdown-container">
							<a href="monday.html" class="day-link">- Monday <span id="dot-monday" class="status-dot"></span></a>
							<a href="tuesday.html" class="day-link">- Tuesday <span id="dot-tuesday" class="status-dot"></span></a>
							<a href="wednesday.html" class="day-link">- Wednesday <span id="dot-wednesday" class="status-dot"></span></a>
							<a href="thursday.html" class="day-link">- Thursday <span id="dot-thursday" class="status-dot"></span></a>
							<a href="friday.html" class="day-link">- Friday <span id="dot-friday" class="status-dot"></span></a>
							<a href="saturday.html" class="day-link">- Saturday <span id="dot-saturday" class="status-dot"></span></a>
							<a href="sunday.html" class="day-link">- Sunday <span id="dot-sunday" class="status-dot"></span></a>
						</div>
					</div>
				</div>
			</div>
        
        <button id="settings-btn" class="icon-btn-wrapper">
            <img class="settings-icon-img" src="images/settings.png" alt="Settings">
        </button>

        <button id="key-btn" class="key-wrapper">
            <img class="key-icon-img" src="images/key.png" alt="Key">
        </button>
		</div>

        <div id="side-panel" class="side-panel">
            <button id="close-panel" class="closebtn">&times;</button>
            <div class="panel-content">
                <h2><u>Settings</u></h2>
                <div class="setting-item">
                    <label id="account-label" class="centered-label">Account</label>
                </div>
                <button id="clear-all-data" class="danger-btn">Clear All Data</button>
            </div>
        </div>

        My To-Do List
        <img class="key-icon" src="images/key.png" style="visibility: hidden;">
        <span></span>
    </div>
    
    <div class="rounded-box">
        <p id="start-help">Start by clicking to the right of this bullet point!</p>
        
        <div class="nav-container">
            <nav class="nav1">
                <a href="completed.html">Completed</a>
                <a href="deleted.html">Recently Deleted</a>
            </nav>
            <nav class="nav2">
                <button id="view-toggle-btn">Post-it View</button>
                <button id="priority-mode-toggle">Priority View</button>
            </nav>
        </div>

        <div id="todo-app">
            <ul id="task-list"></ul>
        </div>
    </div>
</main>

<div id="panel-overlay" class="panel-overlay"></div>

<div id="account-modal" class="modal">
    <div class="modal-content">
        <span id="close-account-modal" class="close-modal">&times;</span>
        <h3>New Details</h3>
        <input type="password" id="new-password" placeholder="Set Password">
        <button id="save-account">Save</button>
    </div>
</div>

<div id="key-modal" class="modal">
    <div class="modal-content">
        <span id="close-key-modal" class="close-modal">&times;</span>
        <h3>Enter Password</h3>
        <input type="password" id="try-password" placeholder="Password">
        <button id="check-password">Try</button>
    </div>
</div>
	
  <script src="js/script.js"></script>
</body>
</html>
