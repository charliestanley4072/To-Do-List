<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completed</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main>
    <div class="title">Completed<span></span></div>

	<div class="rounded-box">
		<button class="clear-btn" onclick="if(confirm('Delete all?')){localStorage.removeItem('myTasks');location.reload();}">
			Delete All
		</button>

		<nav class="nav">
			<a href="index.html">To-Do List</a>
			<a href="deleted.html">Recently Deleted</a>
		</nav>

		<div id="todo-app">
			<ul id="task-list" class="completed-view"></ul>
		</div>
	</div>
</main>

<script>
    const listElement = document.getElementById("task-list");
    const MS_PER_72_HOURS = 259200000;
    
    // 1. Get and Filter
    let tasks = JSON.parse(localStorage.getItem("myTasks") || "[]");
    tasks = tasks.filter(t => (Date.now() - t.time) < MS_PER_72_HOURS);

    // 2. Sync LocalStorage (removes expired items from memory)
    localStorage.setItem("myTasks", JSON.stringify(tasks));

    // 3. Render (One-liner)
    listElement.innerHTML = tasks.map(t => `<li>▪ ${t.text}</li>`).join('');
</script>
</body>
</html>
